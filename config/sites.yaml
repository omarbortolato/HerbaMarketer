# =============================================================================
# HerbaMarketer — Sites configuration
# =============================================================================
# To add a new site: add a new entry here. No code changes required.
# wp_user_env / wp_password_env reference the .env variable names.
# Footer links (preferred_customer_url, distributor_url) are injected into
# every generated email — never hardcoded in the agent.
# =============================================================================

sites:

  herbago_it:
    url: "https://herbago.it"
    language: "it"
    locale: "it-IT"
    platform: "mautic"
    mautic_campaign_id: 4
    email_prefix: "ITA"
    wp_api_url: "https://www.herbago.it/wp-json/wp/v2"
    wp_user_env: "WP_HERBAGO_IT_USER"
    wp_password_env: "WP_HERBAGO_IT_APP_PASSWORD"
    preferred_customer_url: "https://www.hlifeclienteprivilegiato.it/"
    distributor_url: "https://www.hl-distributor.com/it/"
    active: true


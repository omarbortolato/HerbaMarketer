version: "3.11"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: herbamarketer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: herbamarketer
      POSTGRES_USER: herbamarketer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herbamarketer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Dashboard — FastAPI + Uvicorn
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: herbamarketer_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://herbamarketer:${POSTGRES_PASSWORD}@db:5432/herbamarketer
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn dashboard.app:app --host 0.0.0.0 --port 8000"

  # ---------------------------------------------------------------------------
  # Worker — Scheduler APScheduler + Telegram Bot
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: herbamarketer_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://herbamarketer:${POSTGRES_PASSWORD}@db:5432/herbamarketer
    depends_on:
      db:
        condition: service_healthy
    command: python run_worker.py

volumes:
  postgres_data:

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HerbaMarketer</title>
  <link rel="icon" href="/static/logo.jpg" type="image/jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            herba: { DEFAULT: '#00A652', dark: '#007A3D', light: '#E6F7EE' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">

    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🌿</div>
      <h1 class="text-2xl font-bold text-gray-800">HerbaMarketer</h1>
      <p class="text-sm text-gray-500 mt-1">Dashboard di controllo</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-md p-8">

      {% if error %}
      <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">

        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
            Username
          </label>
          <input
            type="text"
            id="username"
            name="username"
            required
            autofocus
            autocomplete="username"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-herba focus:border-transparent"
            placeholder="es. omar"
          >
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-herba focus:border-transparent"
          >
        </div>

        <button
          type="submit"
          class="w-full bg-herba hover:bg-herba-dark text-white font-semibold py-2 px-4 rounded-lg transition text-sm"
        >
          Accedi
        </button>

      </form>
    </div>

  </div>

</body>
</html>
